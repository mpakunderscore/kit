name: CI

on:
    push:
        branches: [main, master]
    pull_request:

jobs:
    verify:
        runs-on: ubuntu-latest
        env:
            DATABASE_URL: file:./data/ci.db
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma Client (server)
              run: npm run prisma:server:generate

            - name: Typecheck
              run: npm run typecheck

            - name: Lint (format + autofix)
              run: npm run lint

            - name: Unit tests
              run: npm run test

            - name: Build
              run: npm run build
